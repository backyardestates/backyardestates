<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Listing photo unavailable">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E2A2A"/>
      <stop offset="100%" stop-color="#081818"/>
    </linearGradient>
    <linearGradient id="house" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B8954A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#B8954A" stop-opacity="0.18"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- subtle horizon line -->
  <rect x="0" y="430" width="800" height="1" fill="#B8954A" fill-opacity="0.12"/>
  <!-- house silhouette -->
  <g transform="translate(280,210)" fill="url(#house)" stroke="#B8954A" stroke-opacity="0.45" stroke-width="1.5" stroke-linejoin="round">
    <!-- roof -->
    <polygon points="120,0 240,90 0,90"/>
    <!-- body -->
    <rect x="20" y="90" width="200" height="130"/>
    <!-- door -->
    <rect x="100" y="150" width="40" height="70" fill="#0E2A2A" stroke="none"/>
    <!-- windows -->
    <rect x="40" y="115" width="40" height="30" fill="#0E2A2A" stroke="none"/>
    <rect x="160" y="115" width="40" height="30" fill="#0E2A2A" stroke="none"/>
  </g>
  <!-- caption -->
  <text x="400" y="490" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic" font-size="22" fill="#B8954A" fill-opacity="0.65"
        letter-spacing="0.04em">
    Photo unavailable
  </text>
  <text x="400" y="520" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="11" fill="#F7F5F0" fill-opacity="0.32"
        letter-spacing="0.22em" text-transform="uppercase">
    BACKYARD ESTATES
  </text>
</svg>
